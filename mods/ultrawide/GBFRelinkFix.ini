;;;;;;;;;; General ;;;;;;;;;;

[Intro Skip]
; Skips company logos and press any button screen.
Enabled = true

[Custom Resolution]
; Replaces "3840 x 2160" in-game with a custom resolution.
; You can leave width and height at 0 if you want your desktop resolution used.
Enabled = true
Width = 0
Height = 0

[Gameplay Camera]
; Adjust values to increase/decrease camera FOV and distance.
; i.e FOV = 1.25 = 25% wider
FOV = 1.0
Distance = 1.0

;;;;;;;;;; Ultrawide/Narrower Fixes ;;;;;;;;;;

[Fix HUD]
; Fixes cropped HUD and spans backgrounds (fades etc).
Enabled = true

[Span HUD]
; EXPERIMENTAL. Spans HUD elements out to the full screen width on ultrawide (party list,
; prompts, etc.) instead of a centered 16:9 band. Known issue: it also shifts some
; world-anchored prompts (e.g. the "Quest Counter" label), and menus aren't spanned.
; Off by default; set Enabled = true if you want edge-to-edge HUD and don't mind that.
; AspectRatio: 0 = use your actual screen aspect. Or force one, e.g. 2.38888 for 21:9,
; 1.7778 for 16:9, 3.5537 for 32:9.
Enabled = false
AspectRatio = 0

[Fix FOV]
; Fixes cropped FOV at <16:9.
Enabled = true 

;;;;;;;;;; Graphical Tweaks ;;;;;;;;;;

[Shadow Quality]
; Set shadow resolution. Defaults: (Lighting Quality) Ultra = 2048, High = 1024, Standard = 256
Resolution = 2048

[Level of Detail]
; Modifies the distance at which objects pop-in. Increase to reduce object pop-in.
Multiplier = 1

[Disable TAA]
; Set to true to disable temporal anti-aliasing.
Enabled = false

;;;;;;;;;; Experimental ;;;;;;;;;;

[Unlock Framerate]
; Removes framerate limit.
Enabled = false